    <meta name="HandheldFriendly" content="true">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="ko_KR">

    <!--fonts-->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

    <!--공통 css-->
    <link rel="stylesheet" href="../common.css">

    <!-- subordinate page css -->
    <link rel="stylesheet" href="../subpage.css">

    <title>운영진 티클래스</title>
</head>
<body>

    <!-- header wide -->
    <header class="header">
        <div class="layout_full header_inner">
            <button id="menuToggle" class="toggle-btn" onclick="toggleNav()" aria-label="Toggle Navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <h1 class="header_logo">
                <a href="../index.html"><img src="../main_images/0001.png" width="154" height="23" alt="오설록" class="logo_img"></a>
            </h1>
        </div>
    </header>

    <!-- sidebar -->
    <div id="mySidebar" class="sidebar">
        <div class="sidebar-brand">Navigation</div>
        <a href="../index.html">🏠 Home</a>
        <a href="../events/index.html">📅 Events</a>
        <a href="../teaInfo/index.html">🍵 Tea Info</a>
        <hr>
        <!-- populated at runtime from ../events/events-data.js by events-nav.js -->
        <div id="sidebarEventLinks"></div>
    </div>

    <script src="../subpage.js"></script>
    <script src="../events/events-data.js"></script>
    <script src="../events/events-nav.js"></script>
    <script src="../events/events-meta.js"></script>
    <script src="../events/events-map.js"></script>

    <main id="container" class="magazine">
        <div class="layout_max magazine_wrap">

            <div id="magazine_contents" class="magazine_contents">
                <section class="magazine_teainside layer_1445 teainside_type2">
                    <article class="magazine_article teainside_article teainside_view_06">
                        <div class="article_inner">

                            <!-- hero banner -->
                            <div class="article_header header_overlay">
                                <figure class="article_img">
                                    <!-- TODO: replace with the event's hero photo -->
                                    <div class="img_placeholder" style="width: 100%; aspect-ratio: 1365 / 547;"></div>
                                </figure>
                                <div class="title_wrap">
                                    <div class="title_box">
                                        <p class="sub_title">설다연 운영진 티클래스</p>
                                    </div>
                                </div>
                            </div>

                            <!-- detailed explanation (moved up, right after the hero) -->
                            <div class="magazine_block txt_block top_txt_block">
                                <div class="block_cont">
                                    <div class="cont_para">
                                        <h3 class="para_title mb_10">운영진 티클래스</h3>
                                        <p class="article_txt">
                                            [행사 인사말 및 소개 문단을 작성해주세요.]
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <hr class="article_hr hr_dashed">

                            <!-- info card: date/location/fee/category, plus the
                                 event's one-line description at the right end —
                                 filled in automatically by events-meta.js from this
                                 event's entry in ../events/events-data.js -->
                            <div id="eventMeta" class="event_meta"></div>

                            <!-- embedded map, populated by events-map.js when this event has
                                 lat/lng coordinates (see events-data.js) -->
                            <div id="eventMap" class="event_map"></div>

                            <hr class="article_hr hr_dashed">

                            <!-- generic info block — replace with real 수업 내용 details -->
                            <div class="magazine_block_wrap cont_970">
                                <div class="magazine_block txt_block">
                                    <div class="block_cont">
                                        <div class="cont_para mb_30">
                                            <h4 class="para_title mb_10">수업 내용</h4>
                                            <div class="article_txt">
                                                [수업 주제, 준비물 등 참가자가 알아야 할 안내사항을 작성해주세요.]
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <hr class="article_hr hr_dashed w_view">

                            <!-- TODO: wire up the real signup flow, then remove `disabled` -->
                            <div class="event_apply">
                                <button type="button" class="event_apply_btn" disabled>신청하기</button>
                            </div>

                        </div>
                    </article>
                </section>
            </div>
        </div>
    </main>

    <!-- footer -->
    <footer class="footer">
        <div class="layout_max footer_inner">
            <div class="footer_about">
                <h2 class="footer_brand">설다연</h2>
                <p class="footer_desc">[동아리 소개 문구를 입력해주세요]</p>
            </div>
            <div class="footer_contact">
                <a class="footer_link" href="https://www.instagram.com/snu_dado/" target="_blank" rel="noopener noreferrer">
                    <span class="footer_icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor"/></svg>
                    </span>
                    <span>@snu_dado</span>
                </a>
                <a class="footer_link" href="mailto:email@example.com">

                    </span>
                    <span>email@example.com</span>

                    </span>

                </a>
            </div>
        </div>
        <div class="footer_bottom">
            <p>&copy; 2026 설다연. All rights reserved.</p>

</body>
</html>
