<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="HandheldFriendly" content="true">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">


    <meta property="og:type" content="website">
    <meta property="og:locale" content="ko_KR">

    <!--fonts-->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

    <!--공통 css-->
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="events/carousel.css">
    <link rel="stylesheet" href="home.css">

    <title>Main Hub</title>

</head>
<body class="page-home">

    <!-- header wide -->
    <header class="header">
        <div class="layout_full header_inner">
            <h1 class="header_logo">
                <a href="index.html"><img src="./main_images/0001.png" width="154" height="23" alt="오설록" class="logo_img"></a>
            </h1>
        </div>
    </header>

    <!-- left-side site nav: jumps to each section's spot on this page
         rather than navigating to the subpage itself -->
    <nav class="home_nav" aria-label="주요 메뉴">
        <a href="index.html" class="active">Home</a>
        <a href="#events">Events</a>
        <a href="#notice">공지사항/Q&amp;A</a>
        <a href="#join">소모임 신청</a>
    </nav>

    <main id="container" class="home">
        <div class="layout_max">

            <!-- Page Title -->
            <div class="section_header">
                <h2 class="title">Welcome to the main portal</h2>

                <h2 class="title">Select a page to visit:</h2>
            </div>

            <div class="page-cards">
                <section id="events" class="home_section" aria-label="Events">
                    <div class="home_card_header">
                        <h3 class="home_card_title">Events</h3>
                        <a class="home_card_more" href="events/index.html">더 알아보기</a>
                    </div>
                    <section class="event_carousel" id="eventCarousel" data-path-prefix="" aria-label="다가오는 행사">
                        <div class="carousel_header">
                            <h3 class="carousel_title">다가오는 행사</h3>
                            <div class="carousel_controls">
                                <div class="carousel_filter">
                                    <button type="button" id="filterToggle" class="filter_toggle" aria-haspopup="listbox" aria-expanded="false">
                                        <span id="filterToggleLabel">전체</span>
                                        <svg class="filter_toggle_icon" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                    <ul id="filterMenu" class="filter_menu" role="listbox" hidden></ul>
                                </div>
                                <button type="button" id="carouselPrev" class="carousel_nav" aria-label="이전">&#8249;</button>
                                <button type="button" id="carouselNext" class="carousel_nav" aria-label="다음">&#8250;</button>
                            </div>
                        </div>
                        <div class="carousel_track" id="carouselTrack"></div>
                    </section>
                </section>

                <a id="notice" href="notice/index.html" class="page-card">
                    <div class="home_card_header">
                        <h3 class="home_card_title">공지사항/Q&amp;A</h3>
                    </div>
                    <div class="page-card_thumb"></div>
                </a>
                <a id="join" href="join/index.html" class="page-card">
                    <div class="home_card_header">
                        <h3 class="home_card_title">소모임 신청</h3>
                    </div>
                    <div class="page-card_thumb"></div>
                </a>
            </div>

            <h1 class="under-construction">모바일 환경에서는 불안정합니다!! PC로 봐주세요</h1>
        
        
            <picture>
                <img src="./main_images/bobTheBuilder.png" style="display: block; width: 100%; height: auto; max-width: 970px; margin: 0 auto;">
            </picture>
        
        </div>
    </main>

    <script src="events/events-data.js"></script>
    <script src="events/events-carousel.js"></script>

    <!-- footer -->
    <footer class="footer">
        <div class="layout_max footer_inner">
            <div class="footer_about">
                <h2 class="footer_brand">설다연</h2>
                <p class="footer_desc">[동아리 소개 문구를 입력해주세요]</p>
            </div>
            <div class="footer_contact">
                <a class="footer_link" href="https://www.instagram.com/snu_dado/" target="_blank" rel="noopener noreferrer">
                    <span class="footer_icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor"/></svg>
                    </span>
                    <span>@snu_dado</span>
                </a>
                <a class="footer_link" href="mailto:email@example.com">
                    <span class="footer_icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M4 6.5l8 6.5 8-6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </span>
                    <span>email@example.com</span>
                </a>
                <a class="footer_link" href="tel:000-0000-0000">
                    <span class="footer_icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.5 3.5c.6 1.4 1 2.6 1.7 3.8.3.5.2 1.1-.2 1.5L6.6 10.2c1 2.5 3.1 4.7 5.6 5.7l1.4-1.4c.4-.4 1-.5 1.5-.2 1.2.7 2.4 1.1 3.8 1.7.6.2.9.8.8 1.4l-.5 2.1c-.1.6-.6 1-1.2 1C10.9 20.2 3.8 13.1 3.5 5c0-.6.4-1.1 1-1.2l2.1-.5c.6-.1 1.2.2 1.4.8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                    </span>
                    <span>000-0000-0000</span>
                </a>
            </div>
        </div>
        <div class="footer_bottom">
            <p>&copy; 2026 설다연. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
